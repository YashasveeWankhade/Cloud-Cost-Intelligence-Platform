server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

        - id: cost-service
          uri: ${COST_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/costs/**,/api/demo/**
          filters:
            - AuthenticationFilter

        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/analytics/**
          filters:
            - AuthenticationFilter

        - id: recommendation-service
          uri: ${RECOMMENDATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/recommendations/**
          filters:
            - AuthenticationFilter

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/notifications/**
          filters:
            - AuthenticationFilter

jwt:
  secret: ${JWT_SECRET:cloudcost-super-secret-key-for-jwt-generation-2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.cloudcost: INFO
